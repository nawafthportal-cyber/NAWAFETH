{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}نوافــذ — تسجيل الدخول{% endblock %}
{% block body_class %}page-login{% endblock %}

{% block content %}
<main class="auth-page">
  <div class="container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">نوافــذ</div>
        <h1 class="auth-title" id="login-title">...</h1>
        <p class="auth-desc" id="login-desc">...</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone-input">رقم الجوال</label>
        <input
          type="tel"
          id="phone-input"
          class="form-input"
          placeholder="05XXXXXXXX"
          maxlength="10"
          inputmode="numeric"
          autocomplete="tel"
          dir="ltr"
        >
        <div class="form-hint" id="login-phone-hint">...</div>
        <div class="form-error hidden" id="phone-error"></div>
      </div>

      <button class="btn-primary" id="btn-send-otp">
        <span id="send-otp-text">...</span>
        <span class="spinner hidden" id="send-otp-spinner"></span>
      </button>

      <div id="faceid-login-section" class="hidden">
        <div class="auth-divider"><span>أو</span></div>
        <button class="btn-faceid-login" id="btn-faceid-login">
          <svg width="22" height="22" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="22" height="22" rx="6"/><circle cx="14" cy="11.5" r="3.5"/><path d="M8.5 23c0-3.5 2.5-6 5.5-6s5.5 2.5 5.5 6"/></svg>
          <span>الدخول بمعرف الوجه</span>
        </button>
      </div>

      <div class="auth-divider"><span>أو</span></div>
      <button class="btn-secondary" id="btn-guest">...</button>
    </div>
  </div>
</main>
{% endblock %}

{% block extra_js %}
<script src="{% static 'mobile_web/js/loginPage.js' %}"></script>
{% endblock %}
