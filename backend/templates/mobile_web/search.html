{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}نوافــذ — بحث مقدمي الخدمة{% endblock %}

{% block content %}
<main class="page-content">
  <!-- Search Hero -->
  <section class="search-hero">
    <div class="container">
      <div class="search-input-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="ابحث عن مقدم خدمة..." autocomplete="off">
        <button class="search-clear hidden" id="search-clear">✕</button>
        <button class="search-filter-btn" id="btn-advanced-filter" title="فلتر متقدم">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#673AB7"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
        </button>
      </div>
      <!-- Advanced filter panel -->
      <div class="advanced-filter-panel hidden" id="advanced-filter-panel">
        <div class="filter-panel-row">
          <div class="filter-panel-group">
            <label class="form-label">المدينة</label>
            <select class="form-select" id="filter-city">
              <option value="">جميع المدن</option>
            </select>
          </div>
          <div class="filter-panel-group">
            <label class="form-label">نطاق السعر</label>
            <div class="price-range-row">
              <input type="number" class="form-input" id="filter-price-min" placeholder="من" min="0">
              <span>-</span>
              <input type="number" class="form-input" id="filter-price-max" placeholder="إلى" min="0">
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="container">
    <!-- Category Filters -->
    <div class="filter-row" id="filter-row">
      <button class="filter-chip active" data-cat-id="">الكل</button>
      <!-- populated by JS -->
    </div>

    <!-- Sort -->
    <div class="sort-row">
      <label class="sort-label">ترتيب:</label>
      <select id="sort-select" class="sort-select">
        <option value="">الافتراضي</option>
        <option value="rating">الأعلى تقييماً</option>
        <option value="followers">الأكثر متابعة</option>
      </select>
      <span class="results-count" id="results-count"></span>
    </div>

    <!-- Providers Grid -->
    <div class="providers-grid" id="providers-list">
      <div class="provider-card skeleton-provider"><div class="provider-cover shimmer"></div><div class="provider-info-skeleton"><div class="shimmer" style="width:60%;height:12px;border-radius:4px"></div><div class="shimmer" style="width:40%;height:10px;border-radius:4px;margin-top:8px"></div></div></div>
      <div class="provider-card skeleton-provider"><div class="provider-cover shimmer"></div><div class="provider-info-skeleton"><div class="shimmer" style="width:60%;height:12px;border-radius:4px"></div><div class="shimmer" style="width:40%;height:10px;border-radius:4px;margin-top:8px"></div></div></div>
      <div class="provider-card skeleton-provider"><div class="provider-cover shimmer"></div><div class="provider-info-skeleton"><div class="shimmer" style="width:60%;height:12px;border-radius:4px"></div><div class="shimmer" style="width:40%;height:10px;border-radius:4px;margin-top:8px"></div></div></div>
      <div class="provider-card skeleton-provider"><div class="provider-cover shimmer"></div><div class="provider-info-skeleton"><div class="shimmer" style="width:60%;height:12px;border-radius:4px"></div><div class="shimmer" style="width:40%;height:10px;border-radius:4px;margin-top:8px"></div></div></div>
    </div>

    <!-- Empty state -->
    <div class="empty-state hidden" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="#ccc"><circle cx="11" cy="11" r="8" fill="none" stroke="#ccc" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="#ccc" stroke-width="2"/></svg>
      <p>لا توجد نتائج</p>
    </div>
  </div>
</main>
{% endblock %}

{% block extra_js %}
<script src="{% static 'mobile_web/js/searchPage.js' %}"></script>
{% endblock %}
