{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}نوافــذ — البداية{% endblock %}
{% block body_class %}page-onboarding{% endblock %}

{% block content %}
<main class="onboarding-page">
  <div class="container">
    <section class="onboarding-card">
      <div class="onboarding-stage" id="onboarding-stage">
        <article class="onboard-status-card">
          <div class="onboard-status-icon">⟳</div>
          <h1>جاري تحميل شاشة البداية</h1>
          <p>يتم جلب المحتوى مباشرة من لوحة التحكم.</p>
        </article>
      </div>

      <div class="onboard-dots" id="onboard-dots"></div>

      <div class="onboard-actions">
        <button class="btn-link onboard-skip" id="btn-onboard-skip">تخطي</button>
        <button class="onboard-next" id="btn-onboard-next" aria-label="التالي">التالي</button>
      </div>
    </section>
  </div>
</main>
{% endblock %}

{% block extra_js %}
<script src="{% static 'mobile_web/js/onboardingPage.js' %}"></script>
{% endblock %}
