{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}نوافــذ — التحقق من الرمز{% endblock %}
{% block body_class %}page-twofa{% endblock %}

{% block content %}
<main class="auth-page">
  <div class="container">
    <div class="auth-card auth-card-tight">
      <div class="auth-header">
        <div class="auth-logo">نوافــذ</div>
        <h1 class="auth-title" id="twofa-title">...</h1>
        <p class="auth-desc" id="twofa-desc">...</p>
      </div>

      <div class="otp-info">
        <p><span id="twofa-phone-notice">...</span> <strong id="otp-phone-label" class="otp-phone-label"></strong></p>
      </div>

      <div class="otp-boxes" id="otp-boxes" dir="ltr">
        <input class="otp-box" id="otp-digit-0" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="الرقم الأول">
        <input class="otp-box" id="otp-digit-1" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="الرقم الثاني">
        <input class="otp-box" id="otp-digit-2" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="الرقم الثالث">
        <input class="otp-box" id="otp-digit-3" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="الرقم الرابع">
      </div>

      <div class="form-error hidden" id="otp-error"></div>

      <button class="btn-primary" id="btn-verify-otp" type="button">
        <span id="verify-otp-text">...</span>
        <span class="spinner hidden" id="verify-otp-spinner"></span>
      </button>

      <div class="otp-actions">
        <span class="btn-link" id="twofa-resend-prompt">...</span>
        <button class="btn-link otp-resend-btn" id="btn-resend-otp" type="button" disabled>
          <span id="twofa-resend-label">...</span> <span id="resend-timer" class="otp-resend-timer">(60)</span>
        </button>
        <a href="/login/" class="btn-link otp-change-phone-link" id="twofa-change-phone-label">...</a>
      </div>
    </div>
  </div>
</main>
{% endblock %}

{% block extra_js %}
<script src="{% static 'mobile_web/js/twofaPage.js' %}"></script>
{% endblock %}
