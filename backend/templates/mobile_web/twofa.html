{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}نوافــذ — التحقق من الرمز{% endblock %}
{% block body_class %}page-twofa{% endblock %}

{% block content %}
<main class="auth-page auth-page-twofa">
  <span class="auth-twofa-bg-shape auth-twofa-bg-shape-a" aria-hidden="true"></span>
  <span class="auth-twofa-bg-shape auth-twofa-bg-shape-b" aria-hidden="true"></span>

  <div class="container auth-twofa-container">
    <div class="auth-card auth-card-tight auth-card-twofa">
      <div class="auth-header">
        <p class="auth-login-kicker auth-twofa-kicker">بوابة نوافذ الموحّدة</p>
        <div class="twofa-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3l7 4v5c0 5-3.5 7.5-7 9-3.5-1.5-7-4-7-9V7l7-4z"></path>
            <path d="M9 12l2 2 4-4"></path>
          </svg>
        </div>
        <div class="auth-logo auth-twofa-logo">نوافــذ</div>
        <h1 class="auth-title" id="twofa-title">...</h1>
        <p class="auth-desc" id="twofa-desc">...</p>
      </div>

      <div class="otp-info otp-info-card">
        <p class="otp-info-label"><span id="twofa-phone-notice">...</span></p>
        <p class="otp-info-phone"><strong id="otp-phone-label" class="otp-phone-label"></strong></p>
      </div>

      <div class="otp-boxes" id="otp-boxes" dir="ltr">
        <input class="otp-box" id="otp-digit-0" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="الرقم الأول">
        <input class="otp-box" id="otp-digit-1" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="الرقم الثاني">
        <input class="otp-box" id="otp-digit-2" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="الرقم الثالث">
        <input class="otp-box" id="otp-digit-3" maxlength="1" inputmode="numeric" autocomplete="one-time-code" aria-label="الرقم الرابع">
      </div>

      <div class="form-error hidden" id="otp-error"></div>

      <button class="btn-primary" id="btn-verify-otp" type="button">
        <span id="verify-otp-text">...</span>
        <span class="spinner hidden" id="verify-otp-spinner"></span>
      </button>

      <div id="faceid-twofa-section" class="twofa-faceid hidden">
        <div class="auth-divider"><span>أو</span></div>
        <button class="btn-faceid-login" id="btn-faceid-twofa" type="button" data-default-label="الدخول بمعرف الوجه">
          <svg width="22" height="22" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="22" height="22" rx="6"></rect>
            <circle cx="14" cy="11.5" r="3.5"></circle>
            <path d="M8.5 23c0-3.5 2.5-6 5.5-6s5.5 2.5 5.5 6"></path>
          </svg>
          <span id="twofa-faceid-label">الدخول بمعرف الوجه</span>
        </button>
      </div>

      <div class="otp-actions twofa-resend-row">
        <span class="btn-link" id="twofa-resend-prompt">...</span>
        <button class="btn-link otp-resend-btn" id="btn-resend-otp" type="button" disabled>
          <span id="twofa-resend-label">...</span>
          <span class="spinner hidden" id="resend-otp-spinner"></span>
        </button>
      </div>
      <div class="twofa-countdown-pill" id="resend-countdown-pill">
        <span id="resend-countdown-text">...</span>
      </div>
    </div>
  </div>
</main>
{% endblock %}

{% block extra_js %}
<script src="{% static 'mobile_web/js/twofaPage.js' %}?v=20260419-account-messages"></script>
{% endblock %}
