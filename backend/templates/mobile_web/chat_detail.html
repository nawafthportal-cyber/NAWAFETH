{% extends "mobile_web/base.html" %}
{% load static %}

{% block title %}نوافــذ — محادثة{% endblock %}
{% block sidebar_chats %}active{% endblock %}
{% block body_class %}page-chat-detail{% endblock %}

{% block content %}
<main class="chat-detail-page">
  <!-- Chat header -->
  <div class="chat-header" id="chat-header">
    <a href="/chats/" class="chat-back-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
    </a>
    <div class="chat-peer-avatar" id="peer-avatar"></div>
    <div class="chat-peer-info">
      <div class="chat-peer-name" id="peer-name">...</div>
      <div class="chat-peer-status" id="peer-status"></div>
    </div>
    <div class="chat-header-actions">
      <button class="nav-icon-btn" id="btn-chat-fav" title="مفضلة">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Messages area -->
  <div class="chat-messages" id="chat-messages">
    <div id="messages-loader" class="text-center" style="padding:40px">
      <div class="spinner-inline"></div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="chat-input-bar">
    <input type="text" id="msg-input" class="chat-msg-input" placeholder="اكتب رسالة..." autocomplete="off">
    <button class="chat-send-btn" id="btn-send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</main>
{% endblock %}

{% block extra_js %}
<script src="{% static 'mobile_web/js/chatDetailPage.js' %}"></script>
{% endblock %}
