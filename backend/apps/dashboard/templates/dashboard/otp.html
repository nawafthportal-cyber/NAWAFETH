<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTP - لوحة التحكم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #8f2e8a 0%, #5e35b1 100%); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white shadow-2xl border border-gray-100 rounded-2xl overflow-hidden">
      <div class="gradient-bg px-6 py-8">
        <div class="text-white text-2xl font-extrabold">رمز التحقق</div>
        <div class="text-white/80 text-sm mt-1">{{ phone }}</div>
      </div>

      <div class="p-6">
        {% if messages %}
          <div class="space-y-2 mb-4">
            {% for message in messages %}
              <div class="px-4 py-3 rounded-xl text-sm font-semibold
                          {% if message.tags == 'error' %}bg-rose-50 text-rose-700{% else %}bg-gray-50 text-gray-700{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}

        <form method="post" class="space-y-4">
          {% csrf_token %}
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">أدخل الكود (4 أرقام)</label>
            <input name="code" inputmode="numeric" maxlength="4" autocomplete="one-time-code"
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 text-center tracking-widest text-lg font-extrabold focus:outline-none focus:ring-2 focus:ring-purple-200"
                   placeholder="0000" />
          </div>

          <button class="w-full px-4 py-3 rounded-xl text-white font-extrabold gradient-bg">
            دخول
          </button>

          {% if dev_accept_any %}
            <div class="text-xs text-gray-500 leading-6">
              وضع التطوير: أي 4 أرقام صحيحة.
            </div>
          {% endif %}
        </form>

        <div class="mt-4">
          <a href="{% url 'dashboard:login' %}" class="text-sm font-bold text-gray-600 hover:text-gray-800">تغيير الرقم</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
