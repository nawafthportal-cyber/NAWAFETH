{% extends "dashboard/base_dashboard.html" %}
{% block title %}إنشاء تذكرة دعم{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-cyan-700">إنشاء تذكرة دعم جديدة</h1>
    <p class="text-gray-500 mt-1">إنشاء تذكرة نيابةً عن مستخدم</p>
  </div>
  <a href="{% url 'dashboard:support_tickets_list' %}" class="px-4 py-2 rounded-lg bg-gray-100 font-semibold">رجوع</a>
</div>

<div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 max-w-2xl">
  <form method="post" class="space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-semibold text-gray-600 mb-1">رقم جوال العميل *</label>
      <input name="requester_phone" type="text" required placeholder="05XXXXXXXX"
             class="w-full rounded-lg border-gray-300 px-3 py-2 focus:ring-2 focus:ring-cyan-400">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">نوع الطلب</label>
        <select name="ticket_type" class="w-full rounded-lg border-gray-300 px-3 py-2">
          {% for v, l in type_choices %}
            <option value="{{ v }}">{{ l }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">الأولوية</label>
        <select name="priority" class="w-full rounded-lg border-gray-300 px-3 py-2">
          {% for v, l in priority_choices %}
            <option value="{{ v }}" {% if v == "normal" %}selected{% endif %}>{{ l }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-600 mb-1">وصف الطلب * (300 حرف)</label>
      <textarea name="description" rows="3" maxlength="300" required
                class="w-full rounded-lg border-gray-300 px-3 py-2 focus:ring-2 focus:ring-cyan-400"
                placeholder="اكتب وصف المشكلة أو الطلب..."></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">فريق الدعم</label>
        <select name="assigned_team" class="w-full rounded-lg border-gray-300 px-3 py-2">
          <option value="">بدون تحديد</option>
          {% for team in teams %}
            <option value="{{ team.id }}">{{ team.name_ar }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">المكلف</label>
        <select name="assigned_to" class="w-full rounded-lg border-gray-300 px-3 py-2">
          <option value="">بدون تحديد</option>
          {% for u in staff_users %}
            <option value="{{ u.id }}">{{ u.phone|default:u.username }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-cyan-600 to-blue-600 text-white py-3 font-bold text-lg hover:shadow-lg transition-all">
      إنشاء التذكرة
    </button>
  </form>
</div>
{% endblock %}
