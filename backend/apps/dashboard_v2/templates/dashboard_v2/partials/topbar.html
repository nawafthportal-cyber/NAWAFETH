<header class="sticky top-0 z-30 border-b border-slate-200/80 bg-white/90 backdrop-blur-sm">
    <div class="min-h-16 px-4 py-2 md:px-8 flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-2 min-w-0">
            <button type="button" id="sidebar-open" aria-label="فتح القائمة الجانبية" class="md:hidden rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-100">القائمة</button>
            <button type="button" id="sidebar-expand" aria-label="توسيع القائمة الجانبية" class="hidden rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-100">توسيع القائمة</button>
            <form action="{{ global_search_url }}" method="get" class="hidden md:block" data-no-loading>
                <div class="relative">
                    <label for="v2-global-search" class="sr-only">بحث سريع</label>
                    <input id="v2-global-search" type="search" name="q" placeholder="بحث سريع (placeholder)"
                           class="w-72 max-w-[46vw] rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
                </div>
            </form>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
            <button type="button" aria-label="الإشعارات" class="relative inline-flex items-center justify-center rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-100">
                إشعارات
                {% if notifications_count %}
                    <span class="ms-2 inline-flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-coral px-1 text-[10px] font-bold text-white">{{ notifications_count }}</span>
                {% endif %}
            </button>
            <div class="rounded-xl border border-slate-200 bg-slate-100 px-3 py-2 text-xs font-bold text-slate-700">{{ user_role_label }}</div>
            <div class="hidden sm:block text-sm font-semibold text-slate-700">{{ request.user.phone|default:request.user.username }}</div>
            <a href="{% url 'dashboard_v2:logout' %}" class="inline-flex items-center rounded-xl border border-rose-100 bg-rose-50 px-3 py-2 text-xs font-bold text-rose-700 hover:bg-rose-100">تسجيل الخروج</a>
        </div>
    </div>
</header>
