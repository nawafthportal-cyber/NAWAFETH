{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تسجيل الدخول | Dashboard V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dashboard_v2/css/main.css' %}">
</head>
<body class="v2-preload font-[Cairo] min-h-screen bg-[radial-gradient(circle_at_top_right,_#dbeafe_0%,_#f8fafc_45%,_#f1f5f9_100%)] text-slate-900">
<main class="min-h-screen grid place-items-center px-4">
    <section class="w-full max-w-xl rounded-3xl border-2 border-fuchsia-600 bg-white p-6 shadow-soft">
        <p class="text-xs uppercase tracking-widest text-fuchsia-400">لوحة التحكم</p>
        <h1 class="mt-1 text-3xl font-extrabold text-fuchsia-800">لوحة إدارة الصلاحيات وتقارير المنصة</h1>
        <p class="mt-1 text-sm text-slate-600">تسجيل الدخول لحسابات التشغيل</p>
        {% if messages %}
            <div class="mt-4 space-y-2">
                {% for message in messages %}
                    <div class="rounded-xl px-3 py-2 text-xs font-bold
                        {% if message.tags == 'error' %}bg-rose-50 text-rose-700 border border-rose-200
                        {% else %}bg-slate-100 text-slate-700 border border-slate-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        <form method="post" class="mt-5 space-y-4" data-loading-form>
            {% csrf_token %}
            <label class="block">
                <span class="mb-1 block text-xs font-bold text-fuchsia-700">اسم المستخدم</span>
                <input type="text" name="phone" value="{{ phone|default:'' }}" placeholder="05xxxxxxxx"
                       class="w-full rounded-xl border-2 border-fuchsia-500 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-fuchsia-300">
            </label>
            <label class="block">
                <span class="mb-1 block text-xs font-bold text-fuchsia-700">كلمة المرور</span>
                <input type="password" value="********" disabled
                       class="w-full rounded-xl border-2 border-fuchsia-500 bg-fuchsia-50 px-3 py-2 text-sm text-slate-500">
            </label>
            <div class="flex items-center justify-center gap-3 pt-1">
                <a href="{% url 'home' %}" class="rounded-full border border-slate-300 px-7 py-2 text-sm font-extrabold text-slate-700 hover:bg-slate-100">إلغاء</a>
                <button type="submit" data-loading-text="جاري الإرسال..." class="rounded-full bg-fuchsia-700 px-8 py-2 text-sm font-extrabold text-white hover:bg-fuchsia-800">
                    دخول
                </button>
            </div>
        </form>
    </section>
</main>
<script src="{% static 'dashboard_v2/js/dashboard.js' %}"></script>
</body>
</html>
