<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الحالة</span>
    <select name="status" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for key, label in status_choices %}
            <option value="{{ key }}" {% if status_q == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الخطورة</span>
    <select name="severity" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for key, label in severity_choices %}
            <option value="{{ key }}" {% if severity_q == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">نوع المصدر</span>
    <input type="search" name="source_kind" value="{{ source_q }}" placeholder="reviews / support ..."
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الفئة</span>
    <input type="search" name="category" value="{{ category_q }}" placeholder="تصنيف الحالة"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">المكلّف</span>
    <select name="assignee" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for staff_user in assignee_users %}
            <option value="{{ staff_user.id }}" {% if assignee_q == staff_user.id|stringformat:'s' %}selected{% endif %}>{{ staff_user.phone|default:staff_user.id }}</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">SLA</span>
    <select name="sla_state" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        <option value="open" {% if sla_q == "open" %}selected{% endif %}>مفتوحة</option>
        <option value="due_soon" {% if sla_q == "due_soon" %}selected{% endif %}>مستحقة قريبًا</option>
        <option value="overdue" {% if sla_q == "overdue" %}selected{% endif %}>متجاوزة</option>
        <option value="closed" {% if sla_q == "closed" %}selected{% endif %}>مغلقة</option>
    </select>
</label>
