{% for row in page_obj.object_list %}
<tr class="hover:bg-slate-50/80">
    <td class="px-4 py-3 align-top text-xs font-bold text-slate-800">{{ row.provider.display_name|default:"—" }}</td>
    <td class="px-4 py-3 align-top text-xs text-slate-700">{{ row.provider.user.phone|default:"—" }}</td>
    <td class="px-4 py-3 align-top text-xs text-slate-700">{{ row.bank_name|default:"—" }}</td>
    <td class="px-4 py-3 align-top text-xs text-slate-700">{{ row.account_name|default:"—" }}</td>
    <td class="px-4 py-3 align-top text-xs font-mono text-slate-700">{{ row.iban|default:"—" }}</td>
    <td class="px-4 py-3 align-top text-xs text-slate-500">{{ row.updated_at|date:"Y-m-d H:i" }}</td>
</tr>
{% endfor %}
