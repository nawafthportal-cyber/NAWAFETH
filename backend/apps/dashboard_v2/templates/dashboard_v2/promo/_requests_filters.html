<label class="block xl:col-span-2">
    <span class="mb-1 block text-xs font-bold text-slate-600">بحث</span>
    <input type="search" name="q" value="{{ q }}" placeholder="كود الطلب / العنوان / جوال العميل"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الحالة المالية</span>
    <select name="status" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for key, label in status_choices %}
            <option value="{{ key }}" {% if status_val == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">حالة التنفيذ</span>
    <select name="ops_status" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for key, label in ops_status_choices %}
            <option value="{{ key }}" {% if ops_status_val == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</label>
