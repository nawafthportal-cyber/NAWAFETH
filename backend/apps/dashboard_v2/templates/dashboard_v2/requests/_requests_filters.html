<label class="block xl:col-span-2">
    <span class="mb-1 block text-xs font-bold text-slate-600">بحث</span>
    <input type="search" name="q" value="{{ q }}" placeholder="كود / وصف / رقم جوال"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الحالة</span>
    <select name="status" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for status_key, status_label in status_choices %}
            <option value="{{ status_key }}" {% if status_val == status_key %}selected{% endif %}>{{ status_label }}</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">النوع</span>
    <select name="type" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for type_key, type_label in type_choices %}
            <option value="{{ type_key }}" {% if type_val == type_key %}selected{% endif %}>{{ type_label }}</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الفريق</span>
    <select name="team" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for team_key, team_label in team_choices %}
            <option value="{{ team_key }}" {% if team_val == team_key %}selected{% endif %}>{{ team_label }}</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">من تاريخ</span>
    <input type="date" name="date_from" value="{{ date_from_val }}"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">إلى تاريخ</span>
    <input type="date" name="date_to" value="{{ date_to_val }}"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
