<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">التقييم</span>
    <select name="rating" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for value in "12345" %}
            <option value="{{ value }}" {% if rating_q == value %}selected{% endif %}>{{ value }} نجوم</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الحالة</span>
    <select name="status" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        {% for key, label in status_choices %}
            <option value="{{ key }}" {% if status_q == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</label>
<label class="block xl:col-span-2">
    <span class="mb-1 block text-xs font-bold text-slate-600">بحث</span>
    <input type="search" name="target" value="{{ target_q }}" placeholder="المزود / العميل / رقم الطلب"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">من تاريخ</span>
    <input type="date" name="date_from" value="{{ date_from_q }}"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">إلى تاريخ</span>
    <input type="date" name="date_to" value="{{ date_to_q }}"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
