<label class="block xl:col-span-2">
    <span class="mb-1 block text-xs font-bold text-slate-600">بحث</span>
    <input type="search" name="q" value="{{ q }}" placeholder="جوال / اسم"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الدور</span>
    <select name="role" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        <option value="none" {% if role_filter == "none" %}selected{% endif %}>بدون ملف وصول</option>
        {% for role_value, role_label in role_choices %}
            <option value="{{ role_value }}" {% if role_filter == role_value %}selected{% endif %}>{{ role_label }}</option>
        {% endfor %}
    </select>
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الحالة</span>
    <select name="status" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        <option value="active" {% if status_filter == "active" %}selected{% endif %}>نشط</option>
        <option value="inactive" {% if status_filter == "inactive" %}selected{% endif %}>غير نشط</option>
    </select>
</label>
