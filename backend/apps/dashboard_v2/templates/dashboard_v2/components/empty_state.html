<div class="v2-empty-state {% if compact %}p-4{% else %}p-6{% endif %}">
    <div class="mx-auto mb-2 inline-flex h-9 w-9 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-500">∅</div>
    <p class="text-sm font-bold text-slate-700">{{ title|default:"لا توجد بيانات" }}</p>
    {% if text %}
        <p class="mt-1 text-xs text-slate-500">{{ text }}</p>
    {% endif %}
    {% if reason %}
        <p class="mt-1.5 text-[11px] font-semibold text-slate-500">{{ reason }}</p>
    {% endif %}
    {% if hint %}
        <p class="mt-1 text-[11px] text-slate-500">{{ hint }}</p>
    {% endif %}
    {% if action_url and action_label %}
        <a href="{{ action_url }}" class="mt-3 inline-flex items-center rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-bold text-slate-700 hover:bg-slate-100">
            {{ action_label }}
        </a>
    {% endif %}
</div>
