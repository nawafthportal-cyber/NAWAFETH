{% extends "dashboard_v2/base.html" %}

{% block content %}
<div class="space-y-5">
    <section class="rounded-2xl border border-slate-200 bg-white p-4 md:p-5 shadow-soft">
        <div class="flex flex-wrap items-start justify-between gap-3 md:gap-4">
            <div class="space-y-2">
                {% block detail_meta %}{% endblock %}
            </div>
            <div class="flex flex-wrap items-center gap-2 md:gap-2.5">
                {% block detail_actions %}{% endblock %}
            </div>
        </div>
    </section>
    {% block detail_main %}{% endblock %}
</div>
{% endblock %}
