{% with status=value|default:''|lower %}
<span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-bold ring-1 ring-inset
{% if status == 'new' %} bg-sky-100 text-sky-700 ring-sky-200
{% elif status == 'in_progress' %} bg-amber-100 text-amber-700 ring-amber-200
{% elif status == 'returned' %} bg-violet-100 text-violet-700 ring-violet-200
{% elif status == 'closed' %} bg-emerald-100 text-emerald-700 ring-emerald-200
{% elif status == 'active' %} bg-emerald-100 text-emerald-700 ring-emerald-200
{% elif status == 'inactive' %} bg-slate-200 text-slate-700 ring-slate-300
{% elif status == 'pending_payment' %} bg-orange-100 text-orange-700 ring-orange-200
{% elif status == 'cancelled' %} bg-rose-100 text-rose-700 ring-rose-200
{% elif status == 'approved' %} bg-emerald-100 text-emerald-700 ring-emerald-200
{% elif status == 'rejected' %} bg-rose-100 text-rose-700 ring-rose-200
{% elif status == 'hidden' %} bg-slate-300 text-slate-800 ring-slate-400
{% elif status == 'under_review' %} bg-amber-100 text-amber-700 ring-amber-200
{% elif status == 'action_taken' %} bg-emerald-100 text-emerald-700 ring-emerald-200
{% elif status == 'dismissed' %} bg-slate-200 text-slate-700 ring-slate-300
{% elif status == 'escalated' %} bg-rose-100 text-rose-700 ring-rose-200
{% elif status == 'pending' %} bg-amber-100 text-amber-700 ring-amber-200
{% elif status == 'revoked' %} bg-rose-100 text-rose-700 ring-rose-200
{% elif status == 'expired' %} bg-slate-200 text-slate-700 ring-slate-300
{% else %} bg-slate-100 text-slate-700 ring-slate-200
{% endif %}"
      title="{{ label|default:value }}">
    {{ label|default:value }}
</span>
{% endwith %}
