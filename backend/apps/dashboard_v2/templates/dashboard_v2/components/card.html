<article class="rounded-2xl border border-slate-200 bg-white p-4 md:p-5 shadow-soft">
    <p class="text-[11px] uppercase tracking-wide text-slate-500">{{ title }}</p>
    <p class="mt-2 text-2xl md:text-3xl font-extrabold text-ink">{{ value|default:0 }}</p>
    {% if subtitle %}
        <p class="mt-1 text-xs text-slate-600">{{ subtitle }}</p>
    {% endif %}
</article>
