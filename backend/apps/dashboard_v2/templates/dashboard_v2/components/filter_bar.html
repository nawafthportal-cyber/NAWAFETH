<div class="v2-filter-bar mb-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-soft">
    <form method="get" action="{{ form_action }}" class="grid gap-3 md:grid-cols-2 xl:grid-cols-6" data-loading-form>
        {% include fields_template %}
        <div class="flex items-end gap-2 xl:col-span-2">
            <button type="submit" data-loading-text="جاري التحديث..." class="rounded-xl bg-tealbrand px-4 py-2 text-xs font-bold text-white hover:bg-teal-700">تطبيق الفلاتر</button>
            <a href="{{ form_action }}" class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-xs font-bold text-slate-700 hover:bg-slate-100">إعادة ضبط</a>
        </div>
    </form>
</div>
