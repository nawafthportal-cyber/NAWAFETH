<div class="v2-table-shell shadow-soft" data-table-shell>
    <div data-table-content>
        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead class="bg-slate-50 text-slate-600">
                <tr>
                    {% for header in headers %}
                        <th scope="col" class="whitespace-nowrap px-4 py-3 text-right font-bold">{{ header }}</th>
                    {% endfor %}
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 align-top">
                {% if page_obj.object_list %}
                    {% include rows_template %}
                {% else %}
                    <tr>
                        <td colspan="{{ col_count }}" class="px-4 py-6">
                            {% include "dashboard_v2/components/empty_state.html" with title=empty_title text=empty_text compact=True %}
                        </td>
                    </tr>
                {% endif %}
                </tbody>
            </table>
        </div>
    </div>
    <div class="v2-table-skeleton hidden p-4" data-table-skeleton aria-hidden="true">
        <div class="space-y-3">
            <div class="v2-skeleton-line"></div>
            <div class="v2-skeleton-line"></div>
            <div class="v2-skeleton-line"></div>
            <div class="v2-skeleton-line"></div>
        </div>
    </div>
</div>
