<label class="block">
    <span class="mb-1 block text-[11px] font-bold text-slate-600">من</span>
    <input type="date" name="start" value="{{ date_from_val }}" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>

<label class="block">
    <span class="mb-1 block text-[11px] font-bold text-slate-600">إلى</span>
    <input type="date" name="end" value="{{ date_to_val }}" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>

<label class="block">
    <span class="mb-1 block text-[11px] font-bold text-slate-600">القسم</span>
    <select name="section" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        {% for item in sections %}
            <option value="{{ item.key }}" {% if section == item.key %}selected{% endif %}>{{ item.label }}</option>
        {% endfor %}
    </select>
</label>
