<label class="block xl:col-span-2">
    <span class="mb-1 block text-xs font-bold text-slate-600">بحث</span>
    <input type="search" name="q" value="{{ q }}" placeholder="كود الخطة / اسم الخطة"
           class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
</label>
<label class="block">
    <span class="mb-1 block text-xs font-bold text-slate-600">الحالة</span>
    <select name="active" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-tealbrand/40">
        <option value="">الكل</option>
        <option value="1" {% if active_val == "1" or active_val == "true" or active_val == "yes" %}selected{% endif %}>نشطة</option>
        <option value="0" {% if active_val == "0" or active_val == "false" or active_val == "no" %}selected{% endif %}>غير نشطة</option>
    </select>
</label>
