<label class="block">
    <span class="mb-1 block text-[11px] font-bold text-slate-600">بحث</span>
    <input type="text" name="q" value="{{ q }}" placeholder="الخدمة / SKU" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-xs">
</label>

<label class="block">
    <span class="mb-1 block text-[11px] font-bold text-slate-600">الحالة</span>
    <select name="status" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-xs">
        <option value="">الكل</option>
        {% for key, label in status_choices %}
            <option value="{{ key }}" {% if status_val == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</label>
