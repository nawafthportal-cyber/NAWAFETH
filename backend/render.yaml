services:
  - type: web
    name: nawafeth-backend
    runtime: python
    plan: free
    buildCommand: bash scripts/render_build.sh
    startCommand: bash scripts/render_start.sh
    autoDeployTrigger: commit
    healthCheckPath: /health/live/
    envVars:
      - key: DJANGO_ENV
        value: prod
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        value: "134d49caedbc1a33f3e3ca0e8c12ee4f"
      # Add your Render service hostname + custom domains when you have them.
      # Example: nawafeth-2290.onrender.com,nawafeth.app,admin.nawafeth.app
      - key: DJANGO_ALLOWED_HOSTS
        value: "127.0.0.1,localhost,.onrender.com,.nawafthportal.com,nawafthportal.com,www.nawafthportal.com"
      - key: DATABASE_URL
        fromDatabase:
          name: nawafeth-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nawafeth-redis
          type: keyvalue
          property: connectionString
      - key: RUN_MIGRATIONS_ON_START
        value: "0"
      - key: RUN_COLLECTSTATIC_ON_START
        value: "0"
      # Optional overrides:
      # - key: DJANGO_CSRF_TRUSTED_ORIGINS
      #   value: https://*.onrender.com,https://nawafeth.app,https://admin.nawafeth.app
      # - key: DJANGO_CORS_ALLOWED_ORIGINS
      #   value: https://nawafeth.app,https://admin.nawafeth.app
      # - key: USE_R2_MEDIA
      #   value: "1"
      # - key: R2_BUCKET_NAME
      #   value: nawafth-media
      # - key: R2_ENDPOINT_URL
      #   value: https://<accountid>.r2.cloudflarestorage.com
      # - key: R2_PUBLIC_BASE_URL
      #   value: https://cdn.your-domain.com
      # - key: AWS_ACCESS_KEY_ID
      #   sync: false
      # - key: AWS_SECRET_ACCESS_KEY
      #   sync: false
      # - key: AWS_STORAGE_BUCKET_NAME
      #   value: nawafth-media
      # - key: AWS_S3_ENDPOINT_URL
      #   value: https://<accountid>.r2.cloudflarestorage.com

  # Redis/Valkey (Render Key Value) for Channels (recommended in production)
  - type: keyvalue
    name: nawafeth-redis
    plan: free
    ipAllowList: []

databases:
  - name: nawafeth-db
    plan: free
    ipAllowList: []
