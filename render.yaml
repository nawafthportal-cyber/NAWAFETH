services:
  - type: web
    name: nawafeth-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: bash scripts/render_build.sh
    preDeployCommand: python manage.py migrate --noinput && python manage.py collectstatic --clear --noinput && python scripts/startup_smoke.py
    startCommand: bash scripts/render_start.sh
    autoDeployTrigger: commit
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_ENV
        value: prod
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "127.0.0.1,localhost,.onrender.com,.nawafthportal.com,nawafthportal.com,www.nawafthportal.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://nawafthportal.com,https://www.nawafthportal.com,https://*.nawafthportal.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://nawafthportal.com,https://www.nawafthportal.com"
      - key: DATABASE_URL
        fromDatabase:
          name: nawafeth-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nawafeth-redis
          type: keyvalue
          property: connectionString
      - key: RUN_MIGRATIONS_ON_START
        value: "0"
      - key: RUN_COLLECTSTATIC_ON_START
        value: "0"
      - key: RUN_COLLECTSTATIC_RECOVERY_ON_START
        value: "0"
      - key: RUN_STARTUP_SMOKE
        value: "0"
      - key: STARTUP_SMOKE_TIMEOUT_SECONDS
        value: "60"
      - key: FEATURE_MODERATION_CENTER
        value: "1"
      - key: FEATURE_ANALYTICS_EVENTS
        value: "1"
      - key: FEATURE_ANALYTICS_KPI_SURFACES
        value: "1"

  - type: keyvalue
    name: nawafeth-redis
    plan: free
    ipAllowList: []

databases:
  - name: nawafeth-db
    plan: free
    ipAllowList: []
