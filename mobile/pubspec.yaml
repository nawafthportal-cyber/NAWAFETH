name: nawafeth
description: "A new Flutter project with modern UI, RTL support, and advanced chat features."
publish_to: "none" # يمنع النشر إلى pub.dev

version: 1.0.0+1

environment:
  # نخليها أوسع عشان تتوافق مع أغلب الإصدارات المستقرة من Dart 3
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ============================
  # 📌 مكتبات أساسية
  # ============================
  cupertino_icons: ^1.0.9
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # ============================
  # 🎨 واجهات – أنيميشن – أيقونات
  # ============================
  font_awesome_flutter: ^10.12.0     # أيقونات FontAwesome
  animate_do: ^3.3.9                 # مؤثرات جاهزة (Fade, Slide..)

  # ============================
  # 🎥 وسائط (فيديو – صوت – صور – ملفات)
  # ============================
  cached_network_image: ^3.4.1       # تخزين مؤقت للصور من الشبكة (disk + memory)
  video_player: ^2.11.1              # تشغيل الفيديو
  video_thumbnail: ^0.5.6            # صورة مصغّرة للفيديو
  image_picker: ^1.1.2               # اختيار الصور من الكاميرا/المعرض
  file_picker: ^8.3.7                # اختيار ملفات (PDF, Word...)
  flutter_image_compress: ^2.4.0     # ضغط الصور قبل الرفع
  flutter_sound: ^9.2.13             # تسجيل وتشغيل الصوت
  permission_handler: ^11.3.1        # إدارة الأذونات

  # ============================
  # 🔧 خدمات النظام – روابط – مشاركة
  # ============================
  url_launcher: ^6.3.1               # فتح روابط خارجية
  geolocator: ^13.0.4                # تحديد الموقع الجغرافي
  shared_preferences: ^2.5.5         # تخزين محلي (Login, Onboarding)
  flutter_secure_storage: ^9.2.4     # تخزين مشفّر للتوكنات والبيانات الحساسة
  local_auth: ^2.3.0                 # التحقق البيومتري (بصمة / معرف الوجه)
  share_plus: ^12.0.2                # مشاركة نصوص وملفات
  http: ^1.2.0                       # HTTP client للاتصال بالـ Backend API
  flutter_local_notifications: ^18.0.1 # إشعارات محلية مع صوت

  # ============================
  # 🗺️ خرائط تفاعلية (مجانية - بدون API Key)
  # ============================
  flutter_map: ^7.0.2                # خرائط OpenStreetMap المجانية
  latlong2: ^0.9.1                   # للإحداثيات الجغرافية

  # ============================
  # ⭐ Widgets إضافية
  # ============================
  flutter_rating_bar: ^4.0.1         # تقييم بالنجوم
  multi_select_flutter: ^4.1.3       # قوائم اختيار متعدد

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0              # تحسين جودة الكود

flutter:
  uses-material-design: true

  # ============================
  # 🖼️ الموارد (Assets)
  # ============================
  assets:
    - assets/images/
    - assets/videos/

  # ============================
  # 🔤 الخطوط (Cairo Font Family)
  # ============================
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-ExtraLight.ttf
        - asset: assets/fonts/Cairo-Light.ttf
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
        - asset: assets/fonts/Cairo-SemiBold.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
        - asset: assets/fonts/Cairo-ExtraBold.ttf
        - asset: assets/fonts/Cairo-Black.ttf
