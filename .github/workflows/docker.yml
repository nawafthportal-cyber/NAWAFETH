name: Docker Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: nawafeth/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-compose:
    name: Validate Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config > /dev/null

  django-check-and-test:
    name: Django Check And Test
    runs-on: ubuntu-latest
    needs: [build-docker-image, validate-compose]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nawafeth
          POSTGRES_USER: nawafeth
          POSTGRES_PASSWORD: nawafeth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nawafeth -d nawafeth"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: ci-only-secret-key
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://nawafeth:nawafeth@127.0.0.1:5432/nawafeth
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements/base.txt
            backend/requirements/prod.txt
            backend/requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements/dev.txt

      - name: Django system check
        run: python manage.py check --deploy

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest -q
